<app-card>
  <app-card-header [name]="feature.name" [description]="feature.description"  />

  <div class="w-full max-w-2xl mx-auto">
    <app-visual-story-form
      [isLoading]="isLoading()"
      [visualStoryModel]="imageFacade.visualStoryForm()"
      (visualStoryModelChange)="imageFacade.visualStoryForm.set($event)"
      (generate)="imageFacade.generateImages()"
    >
      <span loading-text>{{ feature.loadingText }}</span>
      <span button-text>{{ feature.buttonText }}</span>
    </app-visual-story-form>

    <app-prompt-history
      [history]="imageFacade.promptHistory()"
      (promptSelected)="imageFacade.handleVisualStoryArgs($event)"
      (historyCleared)="imageFacade.clearHistory()"
    />
  </div>

  <app-error-display [error]="error()" />

  <app-gen-media
    class="block mb-2"
    [loadingText]="feature.loadingText"
    [genMediaInput]="imageFacade.genMediaInput()"
    [showCurrentStep]="true"
    #genmedia
  >
    <p class="text-sm">Your generated {{ imageFacade.visualStoryForm().type }} will appear here. Please be patient.</p>
  </app-gen-media>

  <app-visual-story-video
    [userPrompt]="imageFacade.visualStoryForm().userPrompt"
    [images]="images()"
  />
</app-card>
