<div class="relative mx-auto w-full max-w-2xl">
  @if (errorMessage(); as msg) {
    <app-error-display [error]="msg" />
  } @else {
    <div class="flex justify-center">
    <video #videoElement autoplay playsinline [height]="height()" [width]="width()" class="block rounded-lg shadow-sm"></video>

    @if (currentImageURL()) {
      <img [src]="currentImageURL()" alt="Captured Image" [height]="height()" [width]="width()" class="block rounded-lg shadow-sm" />
    }
    </div>
    <app-live-image-controls class="mb-4" [hasURL]="hasURL()" (action)="handleCameraAction($event)" />
    <app-live-images-stripe />
  }
</div>
<canvas
  #canvasElement style="display: none;" [height]="height()" [width]="width()"
></canvas>
